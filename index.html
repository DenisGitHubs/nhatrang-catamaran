<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Прогулки на катамаране в Нячанге — частный чартер на 4 часа. Private catamaran cruises in Nha Trang." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Катамаран в Нячанге ⛵ Nha Trang Catamaran</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Ставим тему до первой отрисовки, чтобы не мигало светлым у тёмных пользователей -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('kat-theme');
          if (t !== 'light' && t !== 'dark') {
            var tg = window.Telegram && window.Telegram.WebApp;
            t = tg && tg.colorScheme === 'dark' ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* нет доступа — тему выставит React */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
